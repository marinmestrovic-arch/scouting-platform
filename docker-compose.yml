name: scouting-platform

services:
  postgres:
    image: postgres:17-alpine
    container_name: scouting-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scouting_platform
      POSTGRES_USER: scouting
      POSTGRES_PASSWORD: scouting
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scouting -d scouting_platform"]
      interval: 5s
      timeout: 3s
      retries: 20
  bootstrap:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scouting:scouting@postgres:5432/scouting_platform?schema=public
      DATABASE_URL_TEST: postgresql://scouting:scouting@postgres:5432/scouting_platform_test?schema=public
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store
    command: ["node", "scripts/run-with-local-env.mjs", "--override-keys=AUTH_SECRET,APP_ENCRYPTION_KEY,NEXT_PUBLIC_APP_URL,OPENAI_API_KEY,HYPEAUDITOR_API_KEY,HUBSPOT_API_KEY,INITIAL_ADMIN_EMAIL,INITIAL_ADMIN_PASSWORD,INITIAL_ADMIN_NAME", "sh", "scripts/dev-bootstrap.sh"]
  web:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scouting:scouting@postgres:5432/scouting_platform?schema=public
      DATABASE_URL_TEST: postgresql://scouting:scouting@postgres:5432/scouting_platform_test?schema=public
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store
    working_dir: /workspace
    command: ["node", "scripts/run-with-local-env.mjs", "--override-keys=AUTH_SECRET,APP_ENCRYPTION_KEY,NEXT_PUBLIC_APP_URL,OPENAI_API_KEY,HYPEAUDITOR_API_KEY,HUBSPOT_API_KEY", "sh", "-lc", "node scripts/validate-local-env.mjs && pnpm --filter @scouting-platform/web dev --hostname 0.0.0.0"]
  worker:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scouting:scouting@postgres:5432/scouting_platform?schema=public
      DATABASE_URL_TEST: postgresql://scouting:scouting@postgres:5432/scouting_platform_test?schema=public
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store
    working_dir: /workspace
    command: ["node", "scripts/run-with-local-env.mjs", "--override-keys=AUTH_SECRET,APP_ENCRYPTION_KEY,NEXT_PUBLIC_APP_URL,OPENAI_API_KEY,HYPEAUDITOR_API_KEY,HUBSPOT_API_KEY", "sh", "-lc", "node scripts/validate-local-env.mjs && pnpm --filter @scouting-platform/worker dev"]

volumes:
  postgres_data:
  node_modules:
  pnpm_store:
