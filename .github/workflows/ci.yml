name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - dev-*
      - dev-marin
      - feat/**
  schedule:
    - cron: "0 6 * * 1"

jobs:
  checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: scouting_platform
          POSTGRES_USER: scouting
          POSTGRES_PASSWORD: scouting
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scouting -d scouting_platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://scouting:scouting@127.0.0.1:5432/scouting_platform?schema=public
      DATABASE_URL_TEST: postgresql://scouting:scouting@127.0.0.1:5432/scouting_platform_test?schema=public
      AUTH_SECRET: ci-auth-secret
      APP_ENCRYPTION_KEY: 01234567890123456789012345678901
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      OPENAI_API_KEY: ""
      HYPEAUDITOR_API_KEY: ""
      HUBSPOT_API_KEY: ""
      LOG_LEVEL: info
      # Disable Prisma's background version check (checkpoint.prisma.io). Its
      # fire-and-forget request can surface a transient ECONNRESET as an
      # unhandled rejection that crashes `prisma generate`, flaking CI.
      CHECKPOINT_DISABLE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Create test database
        run: |
          if ! psql "postgresql://scouting:scouting@127.0.0.1:5432/scouting_platform" -tAc "SELECT 1 FROM pg_database WHERE datname = 'scouting_platform_test'" | grep -q 1; then
            psql "postgresql://scouting:scouting@127.0.0.1:5432/scouting_platform" -v ON_ERROR_STOP=1 -c "CREATE DATABASE scouting_platform_test"
          fi

      - name: Prisma validate
        run: pnpm db:validate

      - name: Prisma generate
        run: pnpm db:generate

      - name: Migrate primary database
        run: pnpm db:migrate:deploy

      - name: Migrate test database
        run: pnpm db:migrate:test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web
        run: pnpm --filter @scouting-platform/web build

      - name: Build worker
        run: pnpm --filter @scouting-platform/worker build

      - name: Test
        run: pnpm test:ci

      - name: Install Playwright browser
        run: pnpm --filter @scouting-platform/web exec playwright install --with-deps chromium

      - name: Playwright smoke
        run: pnpm --filter @scouting-platform/web test:smoke

  deploy-production:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'bobasaki/scouting-platform'
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: deploy-dokku-production
      cancel-in-progress: false
    env:
      DOKKU_HOST: ${{ vars.DOKKU_PROD_HOST }}
      DOKKU_WEB_APP: ${{ vars.DOKKU_PROD_WEB_APP }}
      DOKKU_WORKER_APP: ${{ vars.DOKKU_PROD_WORKER_APP }}
      DOKKU_WEB_URL: ${{ vars.DOKKU_PROD_WEB_URL }}
      DOKKU_DEPLOY_SSH_KEY: ${{ secrets.DOKKU_PROD_DEPLOY_SSH_KEY }}
      DOKKU_KNOWN_HOSTS: ${{ secrets.DOKKU_PROD_KNOWN_HOSTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy configuration
        run: |
          for name in \
            DOKKU_HOST \
            DOKKU_WEB_APP \
            DOKKU_WORKER_APP \
            DOKKU_WEB_URL \
            DOKKU_DEPLOY_SSH_KEY \
            DOKKU_KNOWN_HOSTS
          do
            if [ -z "${!name}" ]; then
              echo "Missing required deploy setting: $name" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DOKKU_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DOKKU_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host dokku-target
            HostName $DOKKU_HOST
            User dokku
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Add Dokku remotes
        run: |
          git remote add dokku-web dokku-target:$DOKKU_WEB_APP
          git remote add dokku-worker dokku-target:$DOKKU_WORKER_APP

      - name: Reclaim failed Dokku build artifacts
        run: ssh dokku-target cleanup

      - name: Deploy worker
        run: git push dokku-worker HEAD:main

      - name: Apply migrations
        run: ssh dokku-target run "$DOKKU_WORKER_APP" pnpm --filter @scouting-platform/db db:migrate:deploy

      - name: Deploy web
        run: git push dokku-web HEAD:main

      - name: Configure web upload proxy limit
        run: |
          ssh dokku-target nginx:set "$DOKKU_WEB_APP" client-max-body-size 6m
          ssh dokku-target proxy:build-config "$DOKKU_WEB_APP"

      - name: Smoke check login page
        run: curl --fail --silent --show-error --location "$DOKKU_WEB_URL/login" > /dev/null

      - name: Gather Dokku logs on failure
        if: failure()
        run: |
          ssh dokku-target logs "$DOKKU_WORKER_APP" -n 200 || true
          ssh dokku-target logs "$DOKKU_WEB_APP" -n 200 || true

  deploy-staging:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/dev' &&
      github.repository == 'bobasaki/scouting-platform'
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: deploy-dokku-staging
      cancel-in-progress: false
    env:
      DOKKU_HOST: ${{ vars.DOKKU_STAGING_HOST }}
      DOKKU_WEB_APP: ${{ vars.DOKKU_STAGING_WEB_APP }}
      DOKKU_WORKER_APP: ${{ vars.DOKKU_STAGING_WORKER_APP }}
      DOKKU_WEB_URL: ${{ vars.DOKKU_STAGING_WEB_URL }}
      DOKKU_DEPLOY_SSH_KEY: ${{ secrets.DOKKU_STAGING_DEPLOY_SSH_KEY }}
      DOKKU_KNOWN_HOSTS: ${{ secrets.DOKKU_STAGING_KNOWN_HOSTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy configuration
        run: |
          for name in \
            DOKKU_HOST \
            DOKKU_WEB_APP \
            DOKKU_WORKER_APP \
            DOKKU_WEB_URL \
            DOKKU_DEPLOY_SSH_KEY \
            DOKKU_KNOWN_HOSTS
          do
            if [ -z "${!name}" ]; then
              echo "Missing required deploy setting: $name" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DOKKU_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DOKKU_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host dokku-target
            HostName $DOKKU_HOST
            User dokku
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Add Dokku remotes
        run: |
          git remote add dokku-web dokku-target:$DOKKU_WEB_APP
          git remote add dokku-worker dokku-target:$DOKKU_WORKER_APP

      - name: Reclaim failed Dokku build artifacts
        run: ssh dokku-target cleanup

      - name: Deploy worker
        run: git push dokku-worker HEAD:main

      - name: Apply migrations
        run: ssh dokku-target run "$DOKKU_WORKER_APP" pnpm --filter @scouting-platform/db db:migrate:deploy

      - name: Deploy web
        run: git push dokku-web HEAD:main

      - name: Configure web upload proxy limit
        run: |
          ssh dokku-target nginx:set "$DOKKU_WEB_APP" client-max-body-size 6m
          ssh dokku-target proxy:build-config "$DOKKU_WEB_APP"

      - name: Smoke check login page
        run: curl --fail --silent --show-error --location "$DOKKU_WEB_URL/login" > /dev/null

      - name: Gather Dokku logs on failure
        if: failure()
        run: |
          ssh dokku-target logs "$DOKKU_WORKER_APP" -n 200 || true
          ssh dokku-target logs "$DOKKU_WEB_APP" -n 200 || true

  postgres-image-scan:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule'
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      TRIVY_IMAGE: aquasec/trivy:0.58.2
    steps:
      - name: Pull postgres image
        run: docker pull postgres:17-alpine

      - name: Trivy advisory report (console)
        continue-on-error: true
        run: |
          set -o pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            $TRIVY_IMAGE image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            postgres:17-alpine | tee trivy-postgres.txt

      - name: Trivy advisory report (SARIF)
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            $TRIVY_IMAGE image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /work/trivy-postgres.sarif \
            --exit-code 0 \
            postgres:17-alpine

      - name: Upload advisory scan artifacts
        if: >-
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: actions/upload-artifact@v4
        with:
          name: postgres-image-trivy-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            trivy-postgres.txt
            trivy-postgres.sarif
          if-no-files-found: error
